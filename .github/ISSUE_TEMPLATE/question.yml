name: "💬 Question / Support"
description: "Ask a question or request support regarding the Git Desktop Client"
title: "[Question]: "
labels: ["question", "support"]
body:
  - type: markdown
    attributes:
      value: |
        ### Need help?
        Before opening a question, please check the [README](https://github.com/VesperAkshay/tyegit#readme) and existing issues/discussions.
  - type: textarea
    id: question
    attributes:
      label: "What is your question?"
      description: "Please state your question clearly and provide as much context as possible."
      placeholder: "How do I configure my remote repository URL within the client?"
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: "Environment Information"
      description: "Any relevant details about your setup (OS, git version, client version, etc.)."
      placeholder: "Windows 11, git version 2.45.0, Client v0.2"
    validations:
      required: false
  - type: checkboxes
    id: checklist
    attributes:
      label: "Pre-flight Checklist"
      description: "Please confirm the following before submitting."
      options:
        - label: "I have read the documentation and checked for existing issues/discussions."
          required: true
